name: HOÀN NGUYÊN BUILD.YML KERNEL TỪ REPO GỐC

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/GKI_KernelSU_SUSFS
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: HOÀN NGUYÊN BUILD.YML
        run: |
         cd remote-repo/.github/workflows/
         rm build.yml

         echo "Tải file từ Repo gốc..."
         curl -L -o build.yml \
          https://raw.githubusercontent.com/WildKernels/GKI_KernelSU_SUSFS/refs/heads/main/.github/workflows/build.yml
          echo "--- Nội dung file ---"
          cat build.yml
          
      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/build.yml
            git commit -m "HOÀN NGUYÊN BUILD.YML KERNEL TỪ REPO GỐC"
            git push origin HEAD:main
          fi

      - name: KIỂM TRA
        run: |
          cd remote-repo/.github/workflows/
          cat build.yml
