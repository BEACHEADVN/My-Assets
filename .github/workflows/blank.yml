name: Check Remote FILE_NAME

on:
  workflow_dispatch: # Chạy thủ công để kiểm tra

jobs:
  check-line:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and View FILE_NAME line
        run: |
          # Tải nội dung file build.yml từ repo đích (nhánh main)
          # Sử dụng link raw để đọc nội dung text trực tiếp
          URL="https://raw.githubusercontent.com/BEACHEADVN/GKI_KernelSU_SUSFS/main/.github/workflows/build.yml"
          
          echo "--- Đang tìm dòng chứa FILE_NAME ---"
          # Lệnh curl lấy nội dung, grep tìm dòng, -n để hiện số thứ tự dòng
          curl -s $URL | grep -n "FILE_NAME"
          echo "------------------------------------"
