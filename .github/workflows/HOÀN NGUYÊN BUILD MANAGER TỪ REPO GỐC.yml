name: HOÀN NGUYÊN BUILD.YML TỪ REPO GỐC
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo (Ayaka)
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/Ayaka
          token: ${{ secrets.GH_PAT }}
          path: target-repo
          fetch-depth: 0

      - name: Sync all branches
        run: |
          cd target-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for branch in stable beta canary; do
            echo ">>> Processing $branch"

            # Checkout branch
            git fetch origin refs/heads/$branch:refs/remotes/origin/$branch
            git checkout -B $branch origin/$branch

            # Download đúng branch tương ứng
            curl -L \
            https://raw.githubusercontent.com/WildKernels/Wild_KSU/$branch/.github/workflows/build-manager.yml \
            -o .github/workflows/build-manager.yml

            git add .github/workflows/build-manager.yml

            if ! git diff --staged --quiet; then
              git commit -m "HOÀN NGUYÊN BUILD.YML TỪ REPO GỐC ($branch)"
              git push origin HEAD:refs/heads/$branch
              echo "Pushed $branch"
            else
              echo "No changes for $branch"
            fi

            echo "-----------------------------"
          done
