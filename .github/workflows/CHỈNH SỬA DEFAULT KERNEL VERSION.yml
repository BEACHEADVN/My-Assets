name: CHỈNH SỬA DEFAULT KERNEL VERSION

on:
  workflow_dispatch:

jobs:
  patch-default-value:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/GKI_KernelSU_SUSFS
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Thay đổi Default Custom sang a13-5-15
        run: |
          cd remote-repo/.github/workflows/
          
          # Kiểm tra xem file có tồn tại không trước khi làm
          ls -R # Lệnh này để bạn nhìn thấy sơ đồ file trong log nếu lỗi
          
          if [ -f "main.yml" ]; then
            # Sửa lỗi: dùng [[:space:]]* để chấp nhận mọi kiểu khoảng trắng
            sed -i '/kernel_build_version:/,/default:/s/default:[[:space:]]*custom/default: a13-5-15/' main.yml
          else
            echo "❌ Không tìm thấy file main.yml trong $(pwd)"
            exit 1
          fi

      - name: KIỂM TRA TRƯỚC KHI PUSH
        run: |
          cd remote-repo/.github/workflows/
          echo "=== KIỂM TRA ĐOẠN MÃ ĐÃ SỬA TRONG main.yml ==="
          
          # Thêm "|| true" để nếu không tìm thấy grep cũng không làm đỏ Workflow
          grep -A 15 "kernel_build_version:" main.yml | grep "default:" || echo "⚠️ Không tìm thấy dòng default trong khối này"

      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/workflows/main.yml
          
          # Chỉ push nếu có sự thay đổi
          if git diff-index --quiet HEAD; then
            echo "Không có thay đổi nào để push (Có thể đã là a13-5-15 rồi)."
          else
            git commit -m "chore: change default kernel build version to a13-5-15 in main.yml"
            git push origin HEAD
          fi
