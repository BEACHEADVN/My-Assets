name: CHÈN ADD_KEY VÀO BUILD

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/GKI_KernelSU_SUSFS
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: CHÈN ADD_KEY
        run: |
          cd remote-repo/.github/workflows/

          echo "--- Kiểm tra đã chèn chưa ---"
          if grep -q "TÌM VÀ SỬA KEY" build.yml; then
            echo "Đã tồn tại step, bỏ qua."
          else
            echo "Tiến hành chèn..."

            sed -i '/name: Setup Ayaka/a\
\
    - name: TÌM VÀ SỬA KEY
      run: |\
          echo "•••TÌM SIZE GỐC CỦA WILD_KSU"\
          echo "VỊ TRÍ HIỆN TẠI"\
          pwd\
          echo "CÂY THƯ MỤC"\
          ls\
          cd kernel/Ayaka\
          FILES=$(grep -rl "0x381" .)\
          if [ -n "$FILES" ]; then\
          echo "[✔] Tìm thấy 0x381 trong các file:"\
          echo "$FILES"\
          echo "--- Đang tiến hành sửa thành 0x389 ---"\
          echo "$FILES" | xargs sed -i '\''s/0x381/0x389/g'\''\
          echo "=== Kết quả sau khi sửa ==="\
          grep -rn "0x389" .\
          else\
          echo "[❌] Không tìm thấy 0x381"\
          grep -rn "0x389" .\
          fi\
          echo "•••TÌM HASH GỐC CỦA WILD_KSU"\
          FILES=$(grep -rl "52d52d8c8bfbe53dc2b6ff1c613184e2c03013e090fe8905d8e3d5dc2658c2e4" .)\
          if [ -n "$FILES" ]; then\
          echo "[✔] Tìm thấy HASH:"\
          echo "$FILES"\
          echo "$FILES" | xargs sed -i '\''s/52d52d8c8bfbe53dc2b6ff1c613184e2c03013e090fe8905d8e3d5dc2658c2e4/e8940bdb41a8aa33d4caabd79ede0ece332f2a1eacd324c433728ef66c8170c8/g'\''\
          grep -rn "e8940bdb41a8aa33d4caabd79ede0ece332f2a1eacd324c433728ef66c8170c8" .\
          fi\
          echo "TÌM MANAGER HASH"\
          cat $(find . -type f -name "manager_hash.h")\
          echo "TÌM KBUILD"\
          cat $(find . -type f -name "Kbuild")' build.yml

            echo "Chèn thành công."
          fi

      - name: Push Changes
        run: |
          cd remote-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/build.yml
            git commit -m "Insert FIND & PATCH KEY step"
            git push origin HEAD:main
          fi

      - name: KIỂM TRA
        run: |
          cd remote-repo/.github/workflows/
          cat build.yml
