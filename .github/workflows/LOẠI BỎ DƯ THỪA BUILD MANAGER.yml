name: LOẠI BỎ DƯ THỪA BUILD MANAGER
on:
  workflow_dispatch:

jobs:
  patch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/Ayaka
          token: ${{ secrets.GH_PAT }}
          path: remote-repo
          fetch-depth: 0
  
      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
  
      - name: Patch build-manager.yml safely
        run: |
          cd remote-repo
          FILE_PATH=".github/workflows/build-manager.yml"
  
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
  
          for branch in stable beta canary; do
            echo ">>> Processing $branch"
            git fetch origin refs/heads/$branch:refs/remotes/origin/$branch
            git checkout -B $branch origin/$branch
  
            if [ -f "$FILE_PATH" ]; then
              # 1. Xóa job build-ksud-extra và các bước x86_64 bằng yq
              yq -i 'del(.jobs["build-ksud-extra"])' "$FILE_PATH"
              yq -i '.jobs["build-ksud"].strategy.matrix.include |= map(select(.target == "aarch64-linux-android"))' "$FILE_PATH"
              yq -i '.jobs["build-manager"].steps |= map(select(.name != "Download x86_64 ksud"))' "$FILE_PATH"

              # 2. Xóa các dòng chứa x86_64 bằng sed
              sed -i '/jniLibs\/x86_64/d' "$FILE_PATH"
              sed -i '/x86_64-linux-android\/release\/ksud/d' "$FILE_PATH"

              # 3. FIX DÒNG TRỐNG: Thêm dòng trống trước các khối chính để file dễ đọc
              # Thêm dòng trống trước 'on:', 'jobs:', và tên các job
              sed -i '/^on:/i \\' "$FILE_PATH"
              sed -i '/^jobs:/i \\' "$FILE_PATH"
              sed -i '/  build-ksud:/i \\' "$FILE_PATH"
              sed -i '/  build-manager:/i \\' "$FILE_PATH"
              
              # Xóa các dòng trống thừa (3 dòng trống liên tiếp thành 1)
              sed -i 'N;/^\n$/D;P;D' "$FILE_PATH"

              git add "$FILE_PATH"
              if ! git diff --staged --quiet; then
                git commit -m "LOẠI BỎ DƯ THỪA BUILD MANAGER"
                echo "Committed on $branch"
              fi
            fi
            echo "-----------------------------"
          done
  
      - name: Đẩy Cập Nhật Lên GitHub
        run: |
          cd remote-repo
          for branch in stable beta canary; do
            if git checkout $branch && [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/$branch)" ]; then
              echo ">>> Pushing $branch"
              git push origin HEAD:refs/heads/$branch --force
            fi
          done
