name: THAY ĐỔI TÊN KERNEL

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/GKI_KernelSU_SUSFS
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: THAY ĐỔI TÊN KERNEL
        run: |
         cd remote-repo/.github/workflows/

         echo "--- Kiểm tra đã chèn chưa ---"
         if grep -q "THAY ĐỔI TÊN KERNEL" build.yml; then
         echo "Đã tồn tại, bỏ qua."
         else
         echo "Tải file từ My-Assets..."
         curl -L -o CHANGE_NAME_KERNEL.txt \
          https://raw.githubusercontent.com/BEACHEADVN/My-Assets/refs/heads/main/GKI_KernelSU_SUSFS/CHANGE_NAME_KERNEL.txt
          echo "--- Nội dung file ---"
          cat CHANGE_NAME_KERNEL.txt
          echo "Chèn vào build.yml..."
          awk '/^[[:space:]]*- name: Build Kernel$/{system("cat CHANGE_NAME_KERNEL.txt")}1' build.yml > tmp && mv tmp build.yml
          echo "Chèn thành công."
          fi
      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/build.yml
            git commit -m "THAY ĐỔI TÊN KERNEL"
            git push origin HEAD:main
          fi

      - name: KIỂM TRA
        run: |
          cd remote-repo/.github/workflows/
          awk '/- name: Clean Kernel Flags/{flag=1} /- name: Build Kernel/{print;flag=0} flag' build.yml
