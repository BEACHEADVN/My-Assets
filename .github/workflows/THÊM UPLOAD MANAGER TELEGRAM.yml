name: THÊM UPLOAD MANAGER LÊN TELEGRAM

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: [stable, beta, canary]

    steps:
      - name: 📥 Checkout repo (theo branch)
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: 📥 Download workflow từ My-Assets
        run: |
          curl -L \
          https://raw.githubusercontent.com/BEACHEADVN/My-Assets/main/Wild_KSU/upload-manager-telegram.yml \
          -o upload-manager-telegram.yml

      - name: 📂 Tạo thư mục workflows nếu chưa có
        run: mkdir -p .github/workflows

      - name: 📦 Move file vào đúng chỗ
        run: |
          mv upload-manager-telegram.yml .github/workflows/upload-telegram.yml

      - name: 🧩 Chèn job upload-telegram vào build-manager.yml
        run: |
          FILE=".github/workflows/build-manager.yml"

          if [ -f "$FILE" ]; then
            if ! grep -q "upload-telegram:" "$FILE"; then
              cat << 'EOF' >> "$FILE"

  upload-telegram:
    needs: build-manager
    uses: ./.github/workflows/upload-telegram.yml
    secrets: inherit
EOF
            else
              echo "Đã tồn tại upload-telegram, bỏ qua"
            fi
          else
            echo "Không tìm thấy build-manager.yml"
          fi

      - name: 🔍 Kiểm tra thay đổi
        run: |
          git status
          ls -R .github/workflows

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .github/workflows/upload-telegram.yml
          git add .github/workflows/build-manager.yml

          git commit -m "THÊM UPLOAD MANAGER TELEGRAM (${{
          matrix.branch }})" || echo "No changes"

          git push origin ${{ matrix.branch }}
