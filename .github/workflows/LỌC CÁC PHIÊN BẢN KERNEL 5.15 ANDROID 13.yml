name: LỌC CÁC PHIÊN BẢN KERNEL 5.15 ANDROID 13
on:
  workflow_dispatch:

jobs:
  patch-file-name:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/GKI_KernelSU_SUSFS
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: LỌC VÀ ĐỊNH DẠNG CHUẨN
        run: |
          cd remote-repo/
          FILE_PATH=".github/kernel-config/a13-5.15.json"

          # 1. Lọc dữ liệu và đưa về dạng một dòng (compact)
          jq -c '.include |= map(select(.kernel_version | contains("5.15.170") or contains("5.15.189")))' $FILE_PATH > temp.json

          # 2. Dùng sed để định dạng lại: 
          # - Thêm xuống dòng sau dấu { đầu tiên và sau các dấu phẩy giữa các object
          # - Thêm khoảng trắng thụt lề
          # - Đưa dấu ] và } cuối cùng xuống dòng
          sed -e 's/{"include":\[/{\n  "include": [\n    /g' \
              -e 's/},{"kernel/},\n    {"kernel/g' \
              -e 's/]}\n*$/\n  ]\n}/g' temp.json > $FILE_PATH

          echo "--- Nội dung sau khi định dạng giống sửa tay ---"
          cat $FILE_PATH
          
      - name: Push Changes
        run: |
          cd remote-repo/.github/kernel-config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Kiểm tra xem có sự thay đổi nào để commit không
          if git diff --exit-code a13-5.15.json > /dev/null; then
            echo "Không có thay đổi nào để push."
          else
            git add a13-5.15.json
            git commit -m "LỌC CÁC PHIÊN BẢN KERNEL 5.15 ANDROID 13"
            git push origin main
          fi
          
      - name: KIỂM TRA
        run: |
          cd remote-repo/.github/kernel-config
          echo "NỘI DUNG FILE a13-5.15.json"
          cat a13-5.15.json
