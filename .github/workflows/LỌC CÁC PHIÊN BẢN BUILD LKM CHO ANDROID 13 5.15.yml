name: LỌC CÁC PHIÊN BẢN BUILD LKM CHO ANDROID 13 5.15
on:
  workflow_dispatch:

jobs:
  patch-specific-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/Ayaka
          token: ${{ secrets.GH_PAT }}
          path: remote-repo
          fetch-depth: 0 # QUAN TRỌNG: Phải lấy toàn bộ lịch sử để thấy các branch khác

      - name: LỌC TRÊN 3 BRANCH CHỈ ĐỊNH
        run: |
          cd remote-repo/
          FILE_PATH=".github/workflows/build-lkm.yml"
          
          # Cấu hình Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Danh sách branch
          for branch in stable beta canary; do
            echo ">>> Đang xử lý branch: $branch"
            
            # Buộc phải tạo track với remote branch
            if git checkout $branch || git checkout -b $branch origin/$branch; then
              
              if [ -f "$FILE_PATH" ]; then
                # Lọc chính xác Android 13 5.15
                # Dùng dấu nháy đơn bao quanh regex để tránh shell hiểu lầm
                sed -i '/- android/ { /android13-5.15/ !d }' "$FILE_PATH"
                
                if git add "$FILE_PATH" && git commit -m "Chỉnh sửa tự động: Chỉ giữ lại Android 13 5.15 trên $branch"; then
                  git push origin $branch
                  echo "Đã cập nhật thành công branch: $branch"
                else
                  echo "Không có thay đổi nào cần commit trên branch: $branch"
                fi
              else
                echo "File không tồn tại trên branch $branch"
              fi
            else
              echo "Không thể tìm thấy hoặc checkout branch: $branch"
            fi
            echo "-----------------------------------"
          done
