name: LỌC CÁC PHIÊN BẢN BUILD LKM CHO ANDROID 13 5.15
on:
  workflow_dispatch:

jobs:
  patch-specific-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/Ayaka
          token: ${{ secrets.GH_PAT }}
          path: remote-repo
          fetch-depth: 0 # Tải toàn bộ metadata của các branch

      - name: LỌC TRÊN 3 BRANCH CHỈ ĐỊNH
        run: |
          cd remote-repo/
          FILE_PATH=".github/workflows/build-lkm.yml"
          
          # Cấu hình Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Danh sách branch mục tiêu
          TARGET_BRANCHES=("stable" "beta" "canary")

          for branch in "${TARGET_BRANCHES[@]}"; do
            echo ">>> Đang kiểm tra branch: $branch"
            
            # Kiểm tra xem branch có tồn tại trên remote không trước khi checkout
            if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              git checkout $branch
              
              if [ -f "$FILE_PATH" ]; then
                echo "Đang thực hiện lọc trên $branch..."
                
                # Lọc chính xác Android 13 5.15
                sed -i '/- android/ { /android13-5.15/ !d }' "$FILE_PATH"
                
                git add "$FILE_PATH"
                
                # Kiểm tra thay đổi
                if git diff --staged --quiet; then
                  echo "Branch $branch đã chuẩn, không cần thay đổi."
                else
                  git commit -m "Chỉnh sửa tự động: Chỉ giữ lại Android 13 5.15 trên $branch"
                  git push origin $branch
                  echo "Đã cập nhật $branch thành công!"
                fi
              else
                echo "Bỏ qua: Không tìm thấy file trên $branch."
              fi
            else
              echo "Cảnh báo: Branch '$branch' không tồn tại trên repository."
            fi
            echo "-----------------------------------"
          done
