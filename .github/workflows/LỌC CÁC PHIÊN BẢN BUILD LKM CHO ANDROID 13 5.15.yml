name: LỌC CÁC PHIÊN BẢN BUILD LKM CHO ANDROID 13 5.15
on:
  workflow_dispatch:

jobs:
  patch-specific-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/Ayaka
          token: ${{ secrets.GH_PAT }}
          path: remote-repo
          fetch-depth: 0 # Lấy toàn bộ metadata để có thể chuyển branch

      - name: THỰC HIỆN LỌC TRÊN STABLE, BETA, CANARY
        run: |
          cd remote-repo/
          FILE_PATH=".github/workflows/build-lkm.yml"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Danh sách 3 branch mục tiêu
          for branch in stable beta canary; do
            echo ">>> Đang xử lý branch: $branch"
            
            # Chuyển sang branch mục tiêu (tạo track nếu chưa có ở local)
            if git checkout $branch || git checkout -b $branch origin/$branch; then
              
              if [ -f "$FILE_PATH" ]; then
                # LỌC CHÍNH XÁC: 
                # Tìm các dòng có '- android' 
                # Nếu dòng đó KHÔNG khớp chính xác 'android13-5.15', thực hiện xóa (d)
                # Dấu $ ở cuối để đảm bảo không dính các ký tự thừa phía sau
                sed -i '/- android/ { /android13-5.15$/ !d }' "$FILE_PATH"
                
                git add "$FILE_PATH"
                
                # Kiểm tra nếu có thay đổi thì mới commit và push
                if git diff --staged --quiet; then
                   echo "Branch $branch đã chuẩn (không có thay đổi)."
                else
                   git commit -m "LỌC CÁC PHIÊN BẢN BUILD LKM CHO ANDROID 13 5.15"
                   git push origin $branch
                   echo "Đã cập nhật thành công branch: $branch"
                fi
              else
                echo "Cảnh báo: Không tìm thấy file trên branch $branch"
              fi
            else
              echo "Lỗi: Không thể checkout branch $branch"
            fi
            echo "-----------------------------------"
          done
