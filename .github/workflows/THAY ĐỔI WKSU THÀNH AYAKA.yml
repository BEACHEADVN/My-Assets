name: THAY URL WILD KSU THÀNH AYAKA

on:
  workflow_dispatch:

jobs:
  patch-setup-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/GKI_KernelSU_SUSFS
          token: ${{ secrets.GH_PAT }} # Đảm bảo PAT này đã có quyền 'workflow'
          path: remote-repo

      - name: TÌM VÀ THAY URL
        run: |
          cd remote-repo/.github
          
          # Định nghĩa URL cũ và URL mới
          OLD_URL="https://raw.githubusercontent.com/WildKernels/Wild_KSU"
          NEW_URL="https://raw.githubusercontent.com/BEACHEADVN/Ayaka"
          
          echo "--- Các file có chứa URL cũ ---"
          grep -r "$OLD_URL" . || echo "Không tìm thấy file nào."

          # Dùng find để quét tất cả các file trong .github và subfolders (như workflows)
          # Sử dụng '|' làm dấu phân cách trong sed vì URL có chứa '/'
          find . -type f -exec sed -i "s|$OLD_URL|$NEW_URL|g" {} +

      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update setup.sh source to Ayaka" || exit 0
          git push origin main
          
      - name: KIỂM TRA SAU KHI PUSH
        run: |
           echo "TẬP TIN SAU KHI SỬA"
           sleep 5
           grep -r "https://raw.githubusercontent.com/BEACHEADVN/Ayaka" .
