name: CHỈNH SỬA WORKFLOW CONFIG

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/nothingsvn_xiaomi-toolbuild
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Sửa đổi và Dọn dẹp config trong workflow
        run: |
          cd remote-repo/.github/workflows/
          
          # Thay thế bằng tên file chính xác trong repo của bạn (ví dụ: build.yml)
          TARGET_FILE="build.yml"

          echo "--- Tiến hành chỉnh sửa file $TARGET_FILE ---"
          if [ -f "$TARGET_FILE" ]; then
            # 1. Chuyển required: true thành false ngay sau dòng URL of the ROM to build
            sed -i '/URL of the ROM to build/{n;s/required: true/required: false/}' "$TARGET_FILE"
            
            # 2. Xóa các cụm từ /etc/mysql, /etc/php, mysql*, php* xuất hiện riêng lẻ
            # Sử dụng \b (word boundary) hoặc khoảng trắng để đảm bảo xóa riêng lẻ, không dính vào từ khác
            sed -i -E 's|/etc/mysql||g' "$TARGET_FILE"
            sed -i -E 's|/etc/php||g' "$TARGET_FILE"
            sed -i -E 's|mysql\*||g' "$TARGET_FILE"
            sed -i -E 's|php\*||g' "$TARGET_FILE"
            
            # 3. Loại bỏ 2 dấu cách liên tiếp (lặp lại cho đến khi sạch hẳn)
            sed -i 's/  / /g' "$TARGET_FILE"
            
            echo "Đã chỉnh sửa và dọn dẹp file thành công."
          else
            echo "Không tìm thấy file $TARGET_FILE"
            exit 1
          fi

      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/
            git commit -m "Cấu hình lại URL ROM và xóa bỏ các gói mysql/php thừa"
            git push origin HEAD:main
          fi

      - name: KIỂM TRA LẠI
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          echo "--- Nội dung khu vực URL của ROM ---"
          grep -A 2 "URL of the ROM to build" "$TARGET_FILE" || true
