name: CHỈNH SỬA BUILD.YML CỦA TOOL BUILD

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/nothingsvn_xiaomi-toolbuild
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Lấy file gốc từ tiencv2006 và tiến hành chỉnh sửa
        shell: bash
        run: |
          cd remote-repo/.github/workflows

          echo "--- 1. Tải build.yml mới nhất ---"
          curl -L \
            -o build.yml \
            https://raw.githubusercontent.com/tiencv2006/nothingsvn_xiaomi-toolbuild/main/.github/workflows/build.yml

          TARGET_FILE="build.yml"

          echo "--- 2. required: true -> false ---"
          sed -i '/URL of the ROM to build/{n;s/required: true/required: false/}' "$TARGET_FILE"

          echo "--- 3. Xóa chuỗi mysql/php ---"
          sed -i 's|/etc/mysql||g' "$TARGET_FILE"
          sed -i 's|/etc/php||g' "$TARGET_FILE"
          sed -i 's|mysql\*||g' "$TARGET_FILE"
          sed -i 's|php\*||g' "$TARGET_FILE"

          python3 <<'PY'
          from pathlib import Path
          
          f = Path("build.yml")
          
          old = """jobs:
            Initialize:
              runs-on: ubuntu-latest
              env:
                TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}"""
          
          new = """jobs:
            Initialize:
              runs-on: ubuntu-latest
              strategy:
                matrix:
                  device: [myron, socrates]
                  region: [China, EEA]
                  exclude:
                    - device: socrates
                      region: EEA
                fail-fast: false
              name: Build ROM (${{ matrix.device }} - ${{ matrix.region }})
              env:
                TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}"""
          
          content = f.read_text()
          
          if old in content:
              f.write_text(content.replace(old, new, 1))
              print("Đã thay block Initialize.")
          else:
              print("Không tìm thấy block cần thay.")
          PY
      - name: Push Changes
        run: |
          cd remote-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
            exit 0
          fi

          git add .github/workflows/build.yml
          git commit -m "Đồng bộ build.yml từ tiencv2006"
          git push origin HEAD:main

      - name: KIỂM TRA LẠI
        run: |
          cd remote-repo/.github/workflows

          echo "===== BLOCK INITIALIZE SAU KHI SỬA ====="
          sed -n '/Initialize:/,/TELEGRAM_CHANNEL_ID:/p' build.yml
