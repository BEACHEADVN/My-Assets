name: CHỈNH SỬA BUILD.YML CỦA TOOL BUILD

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/nothingsvn_xiaomi-toolbuild
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Lấy file gốc từ tiencv2006 và tiến hành chỉnh sửa
        shell: bash
        run: |
          cd remote-repo/.github/workflows

          echo "--- 1. Tải build.yml mới nhất ---"
          curl -L \
            -o build.yml \
            https://raw.githubusercontent.com/tiencv2006/nothingsvn_xiaomi-toolbuild/main/.github/workflows/build.yml

          TARGET_FILE="build.yml"

          echo "--- 2. required: true -> false ---"
          sed -i '/URL of the ROM to build/{n;s/required: true/required: false/}' "$TARGET_FILE"

          echo "--- 3. Xóa chuỗi mysql/php ---"
          sed -i 's|/etc/mysql||g' "$TARGET_FILE"
          sed -i 's|/etc/php||g' "$TARGET_FILE"
          sed -i 's|mysql\*||g' "$TARGET_FILE"
          sed -i 's|php\*||g' "$TARGET_FILE"

          echo "--- 4. Tạo block Matrix mới ---"

          printf '%s\n' \
          'Initialize:' \
          '  runs-on: ubuntu-latest' \
          '  strategy:' \
          '    matrix:' \
          '      device: [myron, socrates]' \
          '      region: [China, EEA]' \
          '      exclude:' \
          '        - device: socrates' \
          '          region: EEA' \
          '    fail-fast: false' \
          '' \
          '  name: Build ROM (${{ matrix.device }} - ${{ matrix.region }})' \
          '' \
          '  env:' \
          '    TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}' \
          '    TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}' \
          > matrix_patch.txt
          echo "--- 5. Thay thế khối Initialize bằng Python ---"

          python3 <<'PYTHON'
          from pathlib import Path
          
          target = Path("build.yml")
          matrix = Path("matrix_patch.txt").read_text()
          
          content = target.read_text()
          
          start = content.find("Initialize:")
          if start == -1:
              raise SystemExit("Không tìm thấy Initialize:")
          
          end = content.find("TELEGRAM_CHANNEL_ID:", start)
          if end == -1:
              raise SystemExit("Không tìm thấy TELEGRAM_CHANNEL_ID:")
          
          end = content.find("\n", end)
          if end == -1:
              end = len(content)
          
          new_content = content[:start] + matrix + content[end:]
          
          target.write_text(new_content)
          
          print("Đã thay block Initialize thành công.")
          PYTHON
          
                    rm -f matrix_patch.txt

      - name: Push Changes
        run: |
          cd remote-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
            exit 0
          fi

          git add .github/workflows/build.yml
          git commit -m "Đồng bộ build.yml từ tiencv2006"
          git push origin HEAD:main

      - name: KIỂM TRA LẠI
        run: |
          cd remote-repo/.github/workflows

          echo "===== BLOCK INITIALIZE SAU KHI SỬA ====="
          sed -n '/Initialize:/,/TELEGRAM_CHANNEL_ID:/p' build.yml
