name: CHỈNH SỬA BUILD.YML CỦA TOOL BUILD

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/nothingsvn_xiaomi-toolbuild
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Tải file build.yml gốc từ tiencv2006
        run: |
          cd remote-repo/.github/workflows/
          curl -L -o "build.yml" https://raw.githubusercontent.com/tiencv2006/nothingsvn_xiaomi-toolbuild/main/.github/workflows/build.yml

      - name: Tải các khối cấu hình patch từ My-Assets
        run: |
          cd remote-repo/.github/workflows/
          curl -L -o matrix_patch.txt https://raw.githubusercontent.com/BEACHEADVN/My-Assets/main/ROM/Matrix-source.txt
          curl -L -o insert_install_stuff.txt https://raw.githubusercontent.com/BEACHEADVN/My-Assets/main/ROM/insert_install_stuff.txt
          # Tải thêm file script cào link ROM tự động của bạn
          curl -L -o Fetch-url.txt https://raw.githubusercontent.com/BEACHEADVN/My-Assets/main/ROM/Fetch-url.txt

      - name: Sửa required URL (true -> false) & Dọn dẹp Packages lẻ
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          
          # Sửa required
          sed -i '/input_url:/,/required:/s/required: true/required: false/' "$TARGET_FILE"
          
          # Xóa mysql, php dư thừa
          sed -i 's|/etc/mysql ||g' "$TARGET_FILE"
          sed -i 's|/etc/php ||g' "$TARGET_FILE"
          sed -i 's|mysql\* ||g' "$TARGET_FILE"
          sed -i 's|php\*||g' "$TARGET_FILE"

      - name: Thay thế biến input_url có điều kiện env
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          
          # Giải mã chuỗi text thô từ mã Hex (Bypass quét biến của GitHub)
          python3 -c '
          with open("build.yml", "r", encoding="utf-8") as f:
              content = f.read()
          
          search_str = bytes.fromhex("247b7b20696e707574732e696e7075745f75726c207d7d").decode("utf-8")
          replace_str = bytes.fromhex("247b7b20696e707574732e696e7075745f75726c207c7c20656e762e4155544f5f494e5055545f55524c207d7d").decode("utf-8")
          
          if search_str in content:
              content = content.replace(search_str, replace_str)
              with open("build.yml", "w", encoding="utf-8") as f:
                  f.write(content)
              print("Thay thế biến URL thành công thực sự!")
          else:
              print("Không tìm thấy chuỗi URL hoặc file đã được sửa đổi từ trước.")
          '

      - name: Thay thế khối Initialize bằng Matrix-source
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          
          awk '
            /^[[:space:]]*Initialize:/ {
              # tail -n +2 bỏ qua dòng "jobs:" bị thừa từ file nguồn ngoài
              system("tail -n +2 matrix_patch.txt")
              skip = 1
              next
            }
            skip && /TELEGRAM_CHANNEL_ID:/ {
              skip = 0
              next
            }
            skip { next }
            { print }
          ' "$TARGET_FILE" > tmp_build.yml && mv tmp_build.yml "$TARGET_FILE"

      - name: Lấy Link ROM Tự Động (Trước Notify)
        run: |
          cd remote-repo/.github/workflows/
          # Thực thi trực tiếp file script Python vừa tải về từ My-Assets
          python3 Fetch-url.txt

      - name: Di chuyển bước Install Stuff lên trước Start Notify
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          
          # Tự động chuẩn hóa thụt lề file insert_install_stuff.txt trước khi chèn để tránh lỗi YAML
          awk '
            /^[[:space:]]*- name:/ { sub(/^[[:space:]]*/, "      "); print; next }
            /^[[:space:]]*run:/ { sub(/^[[:space:]]*/, "        "); print; next }
            /^[[:space:]]*/ { sub(/^[[:space:]]*/, "          "); print; next }
            { print }
          ' insert_install_stuff.txt > fixed_install_stuff.txt

          # Cắt khối Install Stuff cũ ở dưới và chèn khối mới lên trước Start Notify
          awk '
            /- name: Start Notify/ {
              system("cat fixed_install_stuff.txt")
              print
              next
            }
            /- name: Install Stuff/ {
              skip = 1
              next
            }
            skip && /sudo pip3 install setuptools/ {
              skip = 0
              next
            }
            skip {
              next
            }
            { print }
          ' "$TARGET_FILE" > tmp_move.yml && mv tmp_move.yml "$TARGET_FILE"

          # Dọn dẹp file sửa lề tạm
          rm -f fixed_install_stuff.txt

      - name: Dọn dẹp file cấu hình tạm (.txt)
        run: |
          cd remote-repo/.github/workflows/
          rm -f matrix_patch.txt insert_install_stuff.txt Fetch-url.txt

      - name: Push Thay Đổi Lên GitHub
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/build.yml
            git commit -m "Đồng bộ build.yml: Chạy Fetch-url từ xa, cấu hình Matrix, đẩy Install Stuff lên trước"
            git push origin HEAD:main
          fi

      - name: Kiểm tra lại cấu trúc sau khi sửa
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          echo "=== KIỂM TRA KHỐI INITIALIZE & MATRIX ==="
          sed -n '/Initialize:/,/TELEGRAM_CHANNEL_ID:/p' "$TARGET_FILE" || true
          echo "=== KIỂM TRA THỨ TỰ INSTALL STUFF & NOTIFY ==="
          grep -E "name: Install Stuff|name: Start Notify" "$TARGET_FILE" || true
