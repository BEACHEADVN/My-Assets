name: CHỈNH SỬA BUILD.YML CỦA TOOL BUILD

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/nothingsvn_xiaomi-toolbuild
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Lấy file gốc từ tiencv2006 và tiến hành chỉnh sửa
        run: |
          cd remote-repo/.github/workflows/
          
          echo "--- 1. Tải nội dung file build.yml gốc từ repo tiencv2006 ---"
          curl -L -o build.yml https://raw.githubusercontent.com/tiencv2006/nothingsvn_xiaomi-toolbuild/main/.github/workflows/build.yml

          TARGET_FILE="build.yml"

          echo "--- 2. Chỉnh sửa cấu hình required: true thành false ---"
          sed -i '/input_url:/,/required:/s/required: true/required: false/' "$TARGET_FILE"
          
          echo "--- 3. Xóa các cụm từ /etc/mysql, /etc/php, mysql*, php* xuất hiện riêng lẻ ---"
          sed -i 's|/etc/mysql ||g' "$TARGET_FILE"
          sed -i 's|/etc/php ||g' "$TARGET_FILE"
          sed -i 's|mysql\* ||g' "$TARGET_FILE"
          sed -i 's|php\*||g' "$TARGET_FILE"

          echo "--- 4. Tạo khối Matrix bằng cách thay thế ký tự tránh bộ lọc GitHub ---"
          # Thay vì dùng ${{ ... }}, ta dùng __GHA_START__ { ... } để đánh dấu, lừa GitHub không parse nhầm
          cat << 'EOF' > matrix_patch.txt
            Initialize:
              runs-on: ubuntu-latest
              strategy:
                matrix:
                  device: [myron, socrates]
                  region: [China, EEA]
                  exclude:
                    - device: socrates
                      region: EEA
                fail-fast: false
              name: Build ROM (__GHA_START__{ matrix.device }} - __GHA_START__{ matrix.region }})
              env:
                TELEGRAM_BOT_TOKEN: __GHA_START__{ secrets.TELEGRAM_BOT_TOKEN }}
                TELEGRAM_CHANNEL_ID: __GHA_START__{ secrets.TELEGRAM_CHANNEL_ID }}
          EOF

          # Dùng sed chuyển chữ __GHA_START__ thành dấu $ đúng nghĩa ngay trên máy ảo
          sed -i 's|__GHA_START__|\\$|g' matrix_patch.txt

          echo "--- 5. Thay thế khối jobs Initialize bằng awk ---"
          awk '
            /^[[:space:]]*Initialize:/ {
              system("cat matrix_patch.txt")
              skip = 1
              next
            }
            skip && /TELEGRAM_CHANNEL_ID:/ {
              skip = 0
              next
            }
            skip { next }
            { print }
          ' "$TARGET_FILE" > tmp_build.yml && mv tmp_build.yml "$TARGET_FILE"

          # Dọn dẹp file cấu hình tạm
          rm -f matrix_patch.txt

      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/build.yml
            git commit -m "Đồng bộ build.yml từ tiencv2006: Thêm Matrix, sửa URL ROM, dọn dẹp packages"
            git push origin HEAD:main
          fi

      - name: KIỂM TRA LẠI
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          echo "--- Kiểm tra khối Initialize mới sau khi sửa ---"
          sed -n '/Initialize:/,/TELEGRAM_CHANNEL_ID:/p' "$TARGET_FILE" || true
