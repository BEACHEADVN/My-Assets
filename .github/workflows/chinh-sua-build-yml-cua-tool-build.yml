name: CHỈNH SỬA BUILD.YML CỦA TOOL BUILD

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/nothingsvn_xiaomi-toolbuild
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Sửa đổi và Cấu hình Matrix cho build.yml
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"

          echo "--- Tiến hành cấu hình file $TARGET_FILE ---"
          if [ -f "$TARGET_FILE" ]; then
          
            # 1. Chuyển required: true thành false ngay sau dòng URL of the ROM to build
            sed -i '/URL of the ROM to build/{n;s/required: true/required: false/}' "$TARGET_FILE"
            
            # 2. Xóa các cụm từ /etc/mysql, /etc/php, mysql*, php* xuất hiện riêng lẻ
            sed -i -E 's|/etc/mysql||g' "$TARGET_FILE"
            sed -i -E 's|/etc/php||g' "$TARGET_FILE"
            sed -i -E 's|mysql\*||g' "$TARGET_FILE"
            sed -i -E 's|php\*||g' "$TARGET_FILE"
            
            # 3. Loại bỏ 2 dấu cách liên tiếp thành 1 dấu cách trên toàn file
            sed -i 's/  / /g' "$TARGET_FILE"

            # 4. Tạo file tạm bằng cách echo từng dòng (Tránh lỗi parse chuỗi YAML của GitHub Actions)
            echo "  Initialize:" > matrix_patch.txt
            echo "    runs-on: ubuntu-latest" >> matrix_patch.txt
            echo "    strategy:" >> matrix_patch.txt
            echo "      matrix:" >> matrix_patch.txt
            echo "        device: [myron, socrates]" >> matrix_patch.txt
            echo "        region: [China, EEA]" >> matrix_patch.txt
            echo "        exclude:" >> matrix_patch.txt
            echo "          - device: socrates" >> matrix_patch.txt
            echo "            region: EEA" >> matrix_patch.txt
            echo "      fail-fast: false" >> matrix_patch.txt
            echo "    name: Build ROM (\${{ matrix.device }} - \${{ matrix.region }})" >> matrix_patch.txt
            echo "    env:" >> matrix_patch.txt
            echo "      TELEGRAM_BOT_TOKEN: \${{ secrets.TELEGRAM_BOT_TOKEN }}" >> matrix_patch.txt
            echo "      TELEGRAM_CHANNEL_ID: \${{ secrets.TELEGRAM_CHANNEL_ID }}" >> matrix_patch.txt

            # 5. Dùng awk để thay thế khối Initialize cũ bằng file matrix_patch.txt vừa tạo
            awk '
              /^[[:space:]]*Initialize:/ {
                system("cat matrix_patch.txt")
                skip = 1
                next
              }
              skip && /TELEGRAM_CHANNEL_ID:/ {
                skip = 0
                next
              }
              skip { next }
              { print }
            ' "$TARGET_FILE" > tmp_build.yml && mv tmp_build.yml "$TARGET_FILE"

            # Dọn dẹp file tạm
            rm -f matrix_patch.txt
            echo "Đã chỉnh sửa, dọn dẹp và cấu hình Matrix thành công."
          else
            echo "Lỗi: Không tìm thấy file $TARGET_FILE trong repo!"
            exit 1
          fi

      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/build.yml
            git commit -m "Cấu hình Matrix cho Initialize, sửa URL ROM và dọn dẹp packages"
            git push origin HEAD:main
          fi

      - name: KIỂM TRA LẠI
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          echo "--- Nội dung phần cấu hình Initialize mới ---"
          sed -n '/Initialize:/,/TELEGRAM_CHANNEL_ID:/p' "$TARGET_FILE" || true
