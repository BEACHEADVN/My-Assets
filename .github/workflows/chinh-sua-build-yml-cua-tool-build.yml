name: CHỈNH SỬA BUILD.YML CỦA TOOL BUILD

on:
  workflow_dispatch:

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Destination Repo
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/nothingsvn_xiaomi-toolbuild
          token: ${{ secrets.GH_PAT }}
          path: remote-repo

      - name: Lấy file gốc từ tiencv2006 và tiến hành chỉnh sửa
        run: |
          cd remote-repo/.github/workflows/
          
          echo "--- 1. Tải nội dung file build.yml gốc từ repo tiencv2006 ---"
          curl -L -o build.yml https://raw.githubusercontent.com/tiencv2006/nothingsvn_xiaomi-toolbuild/main/.github/workflows/build.yml

          TARGET_FILE="build.yml"

          echo "--- 2. Chỉnh sửa cấu hình required: true thành false ---"
          sed -i '/URL of the ROM to build/{n;s/required: true/required: false/}' "$TARGET_FILE"
          
          echo "--- 3. Xóa các cụm từ /etc/mysql, /etc/php, mysql*, php* ---"
          sed -i -E 's|/etc/mysql||g' "$TARGET_FILE"
          sed -i -E 's|/etc/php||g' "$TARGET_FILE"
          sed -i -E 's|mysql\*||g' "$TARGET_FILE"
          sed -i -E 's|php\*||g' "$TARGET_FILE"
          
          echo "--- 4. Loại bỏ 2 dấu cách liên tiếp thành 1 dấu cách ---"
          sed -i 's/  / /g' "$TARGET_FILE"

          echo "--- 5. Tạo khối Matrix mới ---"
          cat << 'MATRIX_DATA' > matrix_patch.txt
  Initialize:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [myron, socrates]
        region: [China, EEA]
        exclude:
          - device: socrates
            region: EEA
      fail-fast: false
    name: Build ROM (${{ matrix.device }} - ${{ matrix.region }})
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
MATRIX_DATA

          echo "--- 6. Tạo file Python script độc lập để xử lý replace ---"
          cat << 'EOF' > patch_matrix.py
import os

target_file = 'build.yml'
matrix_file = 'matrix_patch.txt'

if os.path.exists(target_file) and os.path.exists(matrix_file):
    with open(target_file, 'r') as f:
        content = f.read()

    with open(matrix_file, 'r') as f:
        matrix_content = f.read().strip('\n')

    # Tìm khối Initialize cũ dựa trên 1 space sau khi đã dọn dẹp khoảng trắng ở bước 4
    start_idx = content.find(' Initialize:')
    if start_idx != -1:
        end_idx = content.find('TELEGRAM_CHANNEL_ID:', start_idx)
        if end_idx != -1:
            next_newline = content.find('\n', end_idx)
            new_content = content[:start_idx] + matrix_content + content[next_newline:]
            with open(target_file, 'w') as f:
                f.write(new_content)
            print('Đã chèn khối Matrix thành công.')
        else:
            print('Không tìm thấy dòng TELEGRAM_CHANNEL_ID cũ.')
    else:
        print('Không tìm thấy khối Initialize: cũ.')
else:
    print('Thiếu file cấu hình đầu vào!')
EOF

          # Thực thi script python vừa tạo
          python3 patch_matrix.py

          # Dọn dẹp các file trung gian
          rm -f matrix_patch.txt patch_matrix.py

      - name: Push Changes
        run: |
          cd remote-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi nào để push."
          else
            git add .github/workflows/build.yml
            git commit -m "Đồng bộ build.yml từ tiencv2006: Thêm Matrix, sửa URL ROM, dọn dẹp packages"
            git push origin HEAD:main
          fi

      - name: KIỂM TRA LẠI
        run: |
          cd remote-repo/.github/workflows/
          TARGET_FILE="build.yml"
          echo "--- Kiểm tra khối Initialize mới trong file ---"
          sed -n '/Initialize:/,/TELEGRAM_CHANNEL_ID:/p' "$TARGET_FILE" || true
