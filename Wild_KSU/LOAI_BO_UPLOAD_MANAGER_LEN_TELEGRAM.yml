name: LOẠI BỎ UPLOAD MANAGER LÊN TELEGRAM
on:
  workflow_dispatch:
  workflow_call:

jobs:
  patch-and-push:
    name: LOẠI BỎ UPLOAD MANAGER LÊN TELEGRAM (${{ matrix.branch }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: BEACHEADVN/Ayaka
          token: ${{ secrets.GH_PAT }}
          path: remote-repo
          fetch-depth: 0
  
      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
  
      - name: Remove Telegram بالكامل
        run: |
          cd remote-repo
          FILE_PATH=".github/workflows/build-manager.yml"
  
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
  
          for branch in stable beta canary; do
            echo ">>> Processing $branch"
            git fetch origin refs/heads/$branch:refs/remotes/origin/$branch
            git checkout -B $branch origin/$branch
  
            if [ -f "$FILE_PATH" ]; then
              yq -i '
                # ❌ Xóa job Telegram riêng
                del(.jobs["upload-manager-telegram"]) |

                # ❌ Xóa toàn bộ step liên quan Telegram trong build-manager
                .jobs["build-manager"].steps |= map(
                  select(
                    (.name != "Setup need_upload") and
                    (.uses != "xireiki/channel-post@v1")
                  )
                )
              ' "$FILE_PATH"

              git add "$FILE_PATH"
              if ! git diff --staged --quiet; then
                git commit -m "XÓA UPLOAD MANAGER LÊN TELEGRAM"
                echo "Committed on $branch"
              else
                echo "No changes on $branch"
              fi
            fi
            echo "-----------------------------"
          done
  
      - name: Push changes
        run: |
          cd remote-repo
          for branch in stable beta canary; do
            if git checkout $branch && [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/$branch)" ]; then
              echo ">>> Pushing $branch"
              git push origin HEAD:refs/heads/$branch --force
            fi
          done
