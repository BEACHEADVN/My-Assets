name: Build Manager
on:
  push:
    branches:
      - stable
      - beta
      - canary
    paths:
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - '.github/workflows/ksud.yml'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
  pull_request:
    branches:
      - stable
      - beta
      - canary
    paths:
      - '.github/workflows/**'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
  workflow_call:
  workflow_dispatch:
jobs:
  build-lkm:
    uses: ./.github/workflows/build-lkm.yml
    secrets: inherit
    
  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml
    
  build-ksud:
    needs: [build-lkm, build-ksuinit]
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
    uses: ./.github/workflows/ksud.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}
      
  build-manager:
    needs: build-ksud
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spoofed: [Normal, Spoofed]
    defaults:
      run:
        working-directory: ./manager
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Spoof Package ID
        if: matrix.spoofed == 'Spoofed'
        run: |
          chmod +x spoof
          ./spoof
          
      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Write key
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            {
              echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}'
              echo KEY_ALIAS='${{ secrets.KEY_ALIAS }}'
              echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}'
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo ${{ secrets.KEYSTORE }} | base64 -d > key.jks
          fi
          
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Download arm64 ksud
        uses: actions/download-artifact@v6
        with:
          name: ksud-aarch64-linux-android
          path: .
          
      - name: Copy ksud to app jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp -f ../aarch64-linux-android/release/ksud ../manager/app/src/main/jniLibs/arm64-v8a/libksud.so
      - name: Build with Gradle
        run: ./gradlew clean assembleRelease
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        if: ${{ ( github.event_name != 'pull_request' && (github.ref == 'refs/heads/stable' || github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/canary' )) || github.ref_type == 'tag' }}
        with:
          name: ${{ matrix.spoofed == 'Spoofed' && 'manager-spoofed' || 'manager' }}
          path: manager/app/build/outputs/apk/release/*.apk
          
      - name: Upload mappings
        uses: actions/upload-artifact@v5
        if: ${{ ( github.event_name != 'pull_request' && (github.ref == 'refs/heads/stable' || github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/canary' )) || github.ref_type == 'tag' }}
        with:
          name: ${{ matrix.spoofed == 'Spoofed' && 'mappings-spoofed' || 'mappings' }}
          path: "manager/app/build/outputs/mapping/release/"
          
  upload-manager-telegram:
    needs: build-manager
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Download Normal Manager
        uses: actions/download-artifact@v6
        with:
          name: manager
          path: manager
          
      - name: Download Spoofed Manager
        uses: actions/download-artifact@v6
        with:
          name: manager-spoofed
          path: manager-spoofed
          
      - name: Download All Artifacts
        uses: actions/download-artifact@v6
        with:
          path: all_apks
          
      - name: Get Git Info
        id: git
        run: |
          MSG=$(git log -1 --pretty=format:'%s' | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          echo "msg=$MSG" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          
      - name: Send Notification to Telegram
        if: success()
        uses: xireiki/channel-post@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_USER_ID }}
          context: |
            <b>Repository:</b> <a href="https://github.com/${{ github.repository }}">${{ github.repository }}</a>
          parse_mode: HTML
          method: sendMessage
          
      - name: Post APKs to Telegram
        uses: xireiki/channel-post@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_USER_ID }}
          method: sendFile
          path: "all_apks/**/*.apk"
          parse_mode: HTML
          context: |
            <b>Build:</b> ${{ github.repository }}
            <b>Branch:</b> <a href="https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}">${{ github.ref_name }}</a>
            <b>Commit:</b> <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">${{ steps.git.outputs.sha_short }}</a>
            <b>Workflow:</b> <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a>
            <b>Commit Message:</b> <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">${{ steps.git.outputs.msg }}</a>
